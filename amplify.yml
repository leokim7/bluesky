version: 1
applications:
  - frontend:
      phases:
        preBuild:
          commands:
            - npm ci --legacy-peer-deps || npm install --legacy-peer-deps
        build:
          commands:
            - npm run build
      artifacts:
        baseDirectory: out
        files:
          - "**/*"
      cache:
        paths:
          - node_modules/**/*
          - .next/cache/**/*
